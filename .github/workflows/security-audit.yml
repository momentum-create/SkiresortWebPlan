name: Security audit

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "0 23 * * 0"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  npm-audit:
    name: npm audit (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: root-template
            directory: ""
            lockfile: package-lock.json
          - name: sichinohe-web
            directory: resorts/Sichinohe-CyoueiSki/web
            lockfile: resorts/Sichinohe-CyoueiSki/web/package-lock.json
          - name: sichinohe-scripts
            directory: resorts/Sichinohe-CyoueiSki/scripts
            lockfile: resorts/Sichinohe-CyoueiSki/scripts/package-lock.json

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ${{ matrix.lockfile }}

      - name: Install (npm ci)
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${{ matrix.directory }}" ]; then
            cd "${{ matrix.directory }}"
          fi
          npm ci

      - name: npm audit (high+)
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${{ matrix.directory }}" ]; then
            cd "${{ matrix.directory }}"
          fi
          npm audit --audit-level=high

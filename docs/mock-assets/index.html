<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>LP案モック索引 — 11施設プレビュー</title>
  <meta name="description" content="スキー場LP案モック11施設の日英索引。" />
  <link rel="stylesheet" href="_shared/mock-hub.css" />
  <link rel="stylesheet" href="_shared/mock-i18n.css" />
</head>
<body>
  <p class="mock-banner">
    <strong data-i18n="banner.strong">LP案モック索引</strong>
    <span> — </span>
    <span data-i18n="banner.text">11施設 · 日英対応</span>
  </p>

  <header class="inner header-row">
    <div>
      <p class="eyebrow" data-i18n="hero.eyebrow">SkiresortWebPlan</p>
      <h1 class="hero-title" data-i18n-html="hero.title">LP案モック<br />11施設ハブ</h1>
    </div>
    <div class="lang-switch" role="group" data-i18n-attr="aria-label:lang.switch">
      <button type="button" data-lang-switch="ja" aria-pressed="true">JA</button>
      <button type="button" data-lang-switch="en" aria-pressed="false">EN</button>
    </div>
  </header>

  <main class="inner">
    <p class="lead" data-i18n="hero.lead">集客・機能転換・地域連携戦略レポートから生成したランディングページ案。</p>

    <div class="hub-table-wrap">
      <table>
        <thead>
          <tr>
            <th data-i18n="table.name">施設名</th>
            <th data-i18n="table.region">地域</th>
            <th data-i18n="table.strategy">戦略軸</th>
            <th data-i18n="table.preview">プレビュー</th>
          </tr>
        </thead>
        <tbody id="resort-table-body"></tbody>
      </table>
    </div>

    <p class="note" data-i18n="note">静的HTML · AI生成モック画像</p>
  </main>

  <script src="_shared/mock-hub.js"></script>
</body>
</html>
